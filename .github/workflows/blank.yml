name: MATLAB Tests with Coverage
on: [push, pull_request]  # Trigger workflow on push or pull request events

jobs:
  test:  # Define a job named 'test'
    runs-on: ubuntu-latest  # Use GitHub-hosted Ubuntu runner
    steps:
      - name: Check out repository  # Step 1: Get your code
        uses: actions/checkout@v4
      
      - name: Set up MATLAB  # Step 2: Install MATLAB on the runner
        uses: matlab-actions/setup-matlab@v3
        with:
          products: MATLAB_Test  # Install MATLAB Test
          
      - name: Run tests with coverage  # Step 3: Run your tests and collect coverage
        uses: matlab-actions/run-tests@v3
        with:
          code-coverage-metric-level: mcdc  # Generate coverage summary with mcdc metrics
          code-coverage-html: test-results/coverageHTML

      - uses: actions/upload-artifact@v7
        with:
          path: test-results/coverageHTML
